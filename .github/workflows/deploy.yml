name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

# 授予部署 GitHub Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同一时间只有一个部署任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整的 git 提交历史，使 Quartz 能正确提取笔记的创建/修改时间

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Quartz Plugins
        run: node ./quartz/bootstrap-cli.mjs plugin install

      - name: Build Quartz
        run: node ./quartz/bootstrap-cli.mjs build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public # 构建出的静态网页目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
